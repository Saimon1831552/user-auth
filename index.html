<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auth System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0f;
    --surface: #13131a;
    --border: #2a2a38;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #4ade80;
    --error: #f87171;
    --input-bg: #1a1a24;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* animated bg grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    animation: drift 8s ease-in-out infinite alternate;
  }

  @keyframes drift {
    to { transform: translate(200px, 150px); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 16px;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    font-size: 22px;
    margin-bottom: 12px;
    box-shadow: 0 0 40px rgba(124,106,247,0.35);
  }

  .logo h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo p {
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    animation: fadeUp 0.6s ease 0.1s both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  /* tabs */
  .tabs {
    display: flex;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 9px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* forms */
  .form { display: none; flex-direction: column; gap: 16px; }
  .form.active { display: flex; animation: fadeUp 0.3s ease both; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: 'DM Mono', monospace;
  }

  input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }

  input::placeholder { color: var(--muted); }

  .btn {
    margin-top: 4px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #6254d4);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,106,247,0.4); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-text { transition: opacity 0.2s; }
  .btn.loading .btn-text { opacity: 0; }
  .btn.loading::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* toast */
  .toast {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    animation: fadeUp 0.3s ease both;
  }

  .toast.success { display: flex; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
  .toast.error   { display: flex; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }

  /* profile panel */
  #profile-panel {
    display: none;
    flex-direction: column;
    gap: 20px;
    animation: fadeUp 0.4s ease both;
  }

  #profile-panel.active { display: flex; }

  .profile-header {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .avatar {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800;
    flex-shrink: 0;
  }

  .profile-info h2 { font-size: 18px; font-weight: 800; }
  .profile-info p  { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .profile-row {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .profile-row span:first-child {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .profile-row span:last-child {
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
  }

  .token-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .token-box label {
    display: block;
    margin-bottom: 8px;
  }

  .token-value {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.6;
  }

  .btn-logout {
    padding: 11px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--error);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-logout:hover { background: rgba(248,113,113,0.08); border-color: var(--error); }

  /* animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="logo">
    <div class="logo-mark">⬡</div>
    <h1>AuthKit</h1>
    <p>express + mysql + jwt</p>
  </div>

  <div class="card" id="auth-card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login form -->
    <div class="form active" id="form-login">
      <div id="toast-login" class="toast"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="alice@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
      <button class="btn" id="btn-login" onclick="handleLogin()">
        <span class="btn-text">Sign in</span>
      </button>
    </div>

    <!-- Register form -->
    <div class="form" id="form-register">
      <div id="toast-register" class="toast"></div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="reg-name" placeholder="Alice"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="alice@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••••"/>
      </div>
      <button class="btn" id="btn-register" onclick="handleRegister()">
        <span class="btn-text">Create account</span>
      </button>
    </div>
  </div>

  <!-- Profile panel (shown after login) -->
  <div class="card" id="profile-card" style="display:none">
    <div id="profile-panel" class="active">
      <div class="profile-header">
        <div class="avatar" id="avatar-letter">A</div>
        <div class="profile-info">
          <h2 id="profile-name">—</h2>
          <p>Authenticated ✓</p>
        </div>
      </div>

      <div class="profile-row">
        <span>ID</span>
        <span id="profile-id">—</span>
      </div>
      <div class="profile-row">
        <span>Email</span>
        <span id="profile-email">—</span>
      </div>
      <div class="profile-row">
        <span>Member since</span>
        <span id="profile-date">—</span>
      </div>

      <div class="token-box">
        <label>JWT Token</label>
        <div class="token-value" id="profile-token">—</div>
      </div>

      <button class="btn-logout" onclick="handleLogout()">Sign out</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:4000/api';
  let authToken = localStorage.getItem('token') || null;

  // Auto-load profile if token exists
  if (authToken) showProfile();

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i === 0) === (tab === 'login'))
    );
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-register').classList.toggle('active', tab === 'register');
    clearToasts();
  }

  function showToast(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
    el.className = 'toast ' + type;
  }

  function clearToasts() {
    document.querySelectorAll('.toast').forEach(t => t.className = 'toast');
  }

  function setLoading(btnId, on) {
    const btn = document.getElementById(btnId);
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  async function handleRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!name || !email || !password)
      return showToast('toast-register', 'All fields required', 'error');

    setLoading('btn-register', true);
    try {
      const res  = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      showToast('toast-register', 'Account created! You can now log in.', 'success');
      document.getElementById('reg-name').value = '';
      document.getElementById('reg-email').value = '';
      document.getElementById('reg-password').value = '';
      setTimeout(() => switchTab('login'), 1500);
    } catch (err) {
      showToast('toast-register', err.message, 'error');
    } finally {
      setLoading('btn-register', false);
    }
  }

  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password)
      return showToast('toast-login', 'Email and password required', 'error');

    setLoading('btn-login', true);
    try {
      const res  = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      authToken = data.token;
      localStorage.setItem('token', authToken);
      showProfile(data.user);
    } catch (err) {
      showToast('toast-login', err.message, 'error');
    } finally {
      setLoading('btn-login', false);
    }
  }

  async function showProfile(userFromLogin) {
    document.getElementById('auth-card').style.display = 'none';
    document.getElementById('profile-card').style.display = 'block';

    // if we have user from login response, use it directly
    if (userFromLogin) {
      fillProfile(userFromLogin);
      return;
    }

    // otherwise fetch from /profile using stored token
    try {
      const res  = await fetch(`${API}/profile`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (!res.ok) { handleLogout(); return; }
      const data = await res.json();
      fillProfile(data);
    } catch {
      handleLogout();
    }
  }

  function fillProfile(user) {
    document.getElementById('avatar-letter').textContent = (user.name || '?')[0].toUpperCase();
    document.getElementById('profile-name').textContent  = user.name  || '—';
    document.getElementById('profile-id').textContent    = user.id    || '—';
    document.getElementById('profile-email').textContent = user.email || '—';
    document.getElementById('profile-token').textContent = authToken  || '—';

    if (user.created_at) {
      const d = new Date(user.created_at);
      document.getElementById('profile-date').textContent =
        d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    }
  }

  function handleLogout() {
    authToken = null;
    localStorage.removeItem('token');
    document.getElementById('profile-card').style.display = 'none';
    document.getElementById('auth-card').style.display = 'block';
    switchTab('login');
  }
</script>
</body>
</html>
